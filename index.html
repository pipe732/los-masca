<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Landing Page - Proyecto Integrado</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <footer class="main-footer">
        <div class="container footer-grid">
            <div class="footer-brand">
                <h3>Sazon Digital</h3>
                <p>Cocinando momentos, un ingrediente a la vez. Recetas caseras para el alma.</p>
            </div>

            <div class="footer-links">
                <h4>Explora</h4>
                <ul>
                    <li><a href="#">Recetas Dulces</a></li>
                    <li><a href="#">Platos Fuertes</a></li>
                    <li><a href="#">Blog de Cocina</a></li>
                </ul>
            </div>

            <div class="footer-newsletter">
                <h4>Newsletter</h4>
                <p>Recibe una receta nueva cada semana.</p>
                <form class="newsletter-form">
                    <input type="email" placeholder="Tu email">
                    <button type="submit">Unirme</button>
                </form>
            </div>
        </div>

        <div class="footer-bottom">
            <p>&copy; 2026 Sazon Digital. Hecho con ❤️ y mucha pimienta.</p>
        </div>
    </footer>

</html>
